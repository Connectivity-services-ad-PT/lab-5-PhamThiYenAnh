version: "3.8"

services:
  # Service API FastAPI cho Access Gate
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05-gate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL database service cho Access Gate
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05-gate
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-gatedb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data: